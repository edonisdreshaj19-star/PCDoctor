spring.application.name=pcdoctor-api

spring.datasource.url=jdbc:postgresql://localhost:5432/pcdoctor
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=3
spring.flyway.baseline-description=Existing PCDoctor schema before Flyway